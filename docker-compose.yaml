version: "3.7"
services:
  demo-microservice:
    container_name: users_microservice
    build:
      context: .
    ports:
      - "8080:8080"
      - "8081:8081"
    networks:
      - demo-network

  db:
    container_name: db
    image: mysql:8.0.29
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "users"
      MYSQL_USER: "demo"
      MYSQL_PASSWORD: "demo"
      MYSQL_ROOT_PASSWORD: "demo"
    ports:
      - "3306:3306"
      - "33060:33060"
    networks:
      - demo-network
    volumes:
      - ./mysql_data:/var/lib/mysql

networks:
  demo-network:
    driver: bridge
