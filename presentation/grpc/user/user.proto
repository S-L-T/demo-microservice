syntax = "proto3";

package demo_microservice;

option go_package = "github.com/S-L-T/demo-microservice";

message User {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string nickname = 4;
  string password = 5;
  string email = 6;
  string country = 7;
  string created_at = 8;
  string updated_at = 9;
}

message Filter {
  string first_name = 1;
  string last_name = 2;
  string nickname = 3;
  string email = 4;
  string country = 5;
}

message AddUserRequest {
  User user = 1;
}

message AddUserResponse {
  string id = 1;
}

message UpdateUserRequest {
  string id = 1;
  User user = 2;
}

message UpdateUserResponse {}

message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {}

message GetPaginatedUsersRequest {
  Filter filter = 1;
  string page_num = 2;
  string page_size = 3;
}

message GetPaginatedUsersResponse {
  repeated User users = 1;
}

service UserService {
  rpc AddUser(AddUserRequest) returns (AddUserResponse) {};
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {};
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {};
  rpc GetPaginatedUsers(GetPaginatedUsersRequest) returns (GetPaginatedUsersResponse) {};
}
